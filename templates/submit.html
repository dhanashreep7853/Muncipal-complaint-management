{% extends "base.html" %}
{% block content %}

<div class="page-header animate">
    <div class="header-icon">📝</div>
    <div>
        <h2>Submit a Complaint</h2>
        <p style="color: var(--text-muted); font-size:0.88rem; margin:0;">Fill in the details and we'll route it to the right department</p>
    </div>
</div>

<div class="form-card animate-delay-1">
    <form method="post">
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-person"></i> &nbsp;Full Name</label>
            <input class="form-control" name="name" placeholder="Enter your full name" required>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-tag"></i> &nbsp;Complaint Category</label>
            <select class="form-select" name="category" required>
                <option value="" disabled selected>Select a category</option>
                <option value="Garbage">🗑️ Garbage Collection</option>
                <option value="Road Damage">🚧 Road Damage</option>
                <option value="Streetlight">💡 Streetlight Issue</option>
                <option value="Water Supply">💧 Water Supply</option>
                <option value="Drainage">🌊 Drainage Problem</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-flag"></i> &nbsp;Priority Level</label>
            <div class="d-flex gap-3">
                <label class="priority-option">
                    <input type="radio" name="priority" value="Low" required>
                    <span class="priority-btn low">🟢 Low</span>
                </label>
                <label class="priority-option">
                    <input type="radio" name="priority" value="Medium">
                    <span class="priority-btn medium">🟡 Medium</span>
                </label>
                <label class="priority-option">
                    <input type="radio" name="priority" value="High">
                    <span class="priority-btn high">🔴 High</span>
                </label>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-chat-text"></i> &nbsp;Complaint Description</label>
            <textarea class="form-control" name="description" rows="4" placeholder="Describe the issue in detail..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">
            <i class="bi bi-send"></i> Submit Complaint
        </button>
    </form>
</div>

<style>
    .priority-option input { display: none; }
    .priority-btn {
        display: inline-block;
        padding: 8px 20px;
        border-radius: 8px;
        border: 2px solid #d0e8da;
        cursor: pointer;
        font-size: 0.88rem;
        font-weight: 600;
        transition: all 0.2s;
        background: white;
    }
    .priority-option input:checked + .priority-btn.low { border-color: #16a34a; background: #dcfce7; color: #166534; }
    .priority-option input:checked + .priority-btn.medium { border-color: #ca8a04; background: #fef9c3; color: #854d0e; }
    .priority-option input:checked + .priority-btn.high { border-color: #dc2626; background: #fee2e2; color: #991b1b; }
    .priority-btn:hover { border-color: var(--green-light); }
</style>

{% endblock %}
