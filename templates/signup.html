{% extends "base.html" %}
{% block content %}

<!-- HEADER -->
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<div class="page-header animate">
    <div class="header-icon">🔐</div>
    <div>
        <h2>Create Account</h2>
        <p style="color: var(--text-muted); font-size:0.88rem; margin:0;">
            Register as a citizen or authorized admin
        </p>
    </div>
</div>

<!-- FORM -->
<div class="form-card animate-delay-1">
    <form method="post" autocomplete="off">

        <!-- NAME -->
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-person"></i> &nbsp;Full Name</label>
            <input name="name" class="form-control" placeholder="Enter your full name" required>
        </div>

        <!-- EMAIL -->
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-envelope"></i> &nbsp;Email Address</label>
            <input name="email" type="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-lock"></i> &nbsp;Password</label>
            <input name="password" type="password" class="form-control" placeholder="Create a strong password" required>
        </div>

        <!-- ROLE -->
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-person-badge"></i> &nbsp;Select Role</label>
            <select name="role" id="role" class="form-select" onchange="toggleAdmin()" required>
                <option value="" disabled selected>Select role</option>
                <option value="user">👤 User</option>
                <option value="admin">🛡️ Admin</option>
            </select>
        </div>

        <!-- ADMIN CODE -->
        <div class="mb-4" id="adminCodeWrap" style="display:none;">
            <label class="form-label"><i class="bi bi-shield-lock"></i> &nbsp;Admin Secret Code</label>
            <input name="admin_code" id="admin_code" class="form-control" placeholder="Enter admin authorization code">
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn-submit">
            <i class="bi bi-person-plus"></i> Create Account
        </button>

    </form>
</div>

<!-- STYLING -->
<style>
    /* Smooth show/hide animation */
    #adminCodeWrap {
        transition: all 0.3s ease;
    }

    /* Improve form look slightly */
    .form-card h3 {
        margin-bottom: 1rem;
        font-family: 'Playfair Display', serif;
        color: var(--green-dark);
    }

    /* Focus effect enhancement */
    .form-control:focus, .form-select:focus {
        transform: scale(1.01);
    }

    /* Button spacing */
    .btn-submit {
        margin-top: 10px;
    }
</style>

<!-- SCRIPT -->
<script>
    window.onload = function() {
    document.querySelector("form").reset();
}
function toggleAdmin() {
    let role = document.getElementById("role").value;
    let wrap = document.getElementById("adminCodeWrap");

    if (role === "admin") {
        wrap.style.display = "block";
    } else {
        wrap.style.display = "none";
    }
}
</script>

{% endblock %}
